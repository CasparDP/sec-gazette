llm:
  provider: "ollama" # Options: "anthropic", "openai", "ollama"
  model: "minimax-m2.5:cloud" # For ollama: llama3.1, mistral, etc.
  temperature: 0.0
  host: "http://localhost:11434" # Ollama host

scraper:
  delay_seconds: 2
  max_retries: 3
  start_year: 1979 # Testing with 2000 for AAER verification
  end_year: 2013 # Same as start_year for testing

paths:
  raw_data: "data/raw"
  markdown: "data/markdown"
  extracted: "data/extracted"
  database: "data/processed/sec_digest.duckdb"
